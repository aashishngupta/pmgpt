<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pmgPT — AI Chief of Staff</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --warning: #d29922;
      --error: #f85149;
      --user-bg: #1c2a3a;
      --bot-bg: #161b22;
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; }

    /* Layout */
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; padding: 0 16px; }

    /* Header */
    header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #58a6ff, #bc8cff); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .logo span { font-size: 13px; color: var(--text-muted); }
    .header-controls { display: flex; align-items: center; gap: 10px; }
    select, .tag { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer; }
    select:focus { outline: none; border-color: var(--accent); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 4px; }
    .status-dot.offline { background: var(--error); }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 20px; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg { display: flex; gap: 12px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg-avatar { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; }
    .msg.user .msg-avatar { background: var(--user-bg); border: 1px solid #1c4066; color: var(--accent); }
    .msg.bot .msg-avatar { background: linear-gradient(135deg, #58a6ff22, #bc8cff22); border: 1px solid #58a6ff33; }

    .msg-body { flex: 1; min-width: 0; }
    .msg-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .msg-meta .name { font-weight: 600; font-size: 14px; }
    .msg-meta .agent-tag { background: #58a6ff22; border: 1px solid #58a6ff44; color: var(--accent); border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 500; }
    .msg-meta .time { color: var(--text-muted); font-size: 12px; margin-left: auto; }

    .msg-content { line-height: 1.65; color: var(--text); }

    /* Markdown rendering */
    .msg-content h1, .msg-content h2, .msg-content h3 { margin: 14px 0 8px; font-weight: 600; }
    .msg-content h1 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .msg-content h2 { font-size: 16px; }
    .msg-content h3 { font-size: 15px; color: var(--accent); }
    .msg-content p { margin: 8px 0; }
    .msg-content ul, .msg-content ol { margin: 8px 0 8px 20px; }
    .msg-content li { margin: 4px 0; }
    .msg-content code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-family: var(--mono); font-size: 13px; color: #e8c57b; }
    .msg-content pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin: 10px 0; overflow-x: auto; }
    .msg-content pre code { background: none; border: none; padding: 0; color: var(--text); }
    .msg-content blockquote { border-left: 3px solid var(--accent); margin: 8px 0; padding: 4px 14px; color: var(--text-muted); }
    .msg-content table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 14px; }
    .msg-content th { background: var(--surface2); border: 1px solid var(--border); padding: 8px 12px; text-align: left; font-weight: 600; }
    .msg-content td { border: 1px solid var(--border); padding: 7px 12px; }
    .msg-content tr:hover td { background: var(--surface2); }
    .msg-content strong { font-weight: 600; color: var(--accent-hover); }
    .msg-content em { font-style: italic; color: var(--text-muted); }
    .msg-content a { color: var(--accent); text-decoration: none; }
    .msg-content a:hover { text-decoration: underline; }

    /* Typing indicator */
    .typing { display: flex; align-items: center; gap: 5px; padding: 8px 0; }
    .typing span { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: none; } 30% { transform: translateY(-5px); } }

    /* Input area */
    .input-area { padding: 14px 0 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .input-wrapper { flex: 1; position: relative; }
    textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-family: var(--font);
      font-size: 15px; line-height: 1.5; padding: 12px 44px 12px 16px;
      resize: none; min-height: 50px; max-height: 180px; overflow-y: auto;
      transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      position: absolute; right: 10px; bottom: 10px;
      background: var(--accent); border: none; color: #0d1117;
      width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: background 0.15s;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; }

    .input-hint { margin-top: 8px; font-size: 12px; color: var(--text-muted); }

    /* Welcome */
    .welcome { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .welcome h2 { font-size: 22px; color: var(--text); margin-bottom: 10px; }
    .welcome p { margin-bottom: 20px; line-height: 1.6; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .suggestion {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 16px; font-size: 13px;
      cursor: pointer; color: var(--text); transition: border-color 0.15s, background 0.15s;
    }
    .suggestion:hover { border-color: var(--accent); background: var(--surface2); color: var(--accent); }

    /* Error */
    .error-msg { color: var(--error); font-size: 13px; padding: 8px 12px; background: #f8514922; border: 1px solid #f8514955; border-radius: 8px; margin-top: 6px; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">🧠</div>
      <div>
        <h1>pmgPT</h1>
        <span>AI Chief of Staff</span>
      </div>
    </div>
    <div class="header-controls">
      <span id="statusIndicator"><span class="status-dot" id="statusDot"></span><span id="statusText">Connecting...</span></span>
      <select id="roleSelect" title="Your role">
        <option value="admin">👑 Admin</option>
        <option value="pm_lead">🎯 PM Lead</option>
        <option value="pm" selected>📋 PM</option>
        <option value="viewer">👁 Viewer</option>
      </select>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>Your AI Chief of Staff</h2>
      <p>Ask me anything about sprint planning, PRDs, strategy, analytics, or your PM career.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="useQuery(this)">Summarize my current sprint</button>
        <button class="suggestion" onclick="useQuery(this)">Write a PRD for a search feature</button>
        <button class="suggestion" onclick="useQuery(this)">Build a Q2 roadmap framework</button>
        <button class="suggestion" onclick="useQuery(this)">Analyze retention metrics</button>
        <button class="suggestion" onclick="useQuery(this)">Generate today's standup</button>
        <button class="suggestion" onclick="useQuery(this)">Review my PM resume</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <textarea
          id="queryInput"
          placeholder="Ask pmgPT anything… (Shift+Enter for new line)"
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
          ▶
        </button>
      </div>
    </div>
    <div class="input-hint">
      Auto-detects intent → routes to the right agent with data governance.
      Token: <code>&lt;role&gt;:secret</code> (e.g. <code>pm:secret</code>)
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;
  let isLoading = false;

  // ── Health check ─────────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const res = await fetch(`${API}/health`);
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      if (res.ok) {
        dot.className = 'status-dot';
        txt.textContent = 'Online';
      } else {
        dot.className = 'status-dot offline';
        txt.textContent = 'Degraded';
      }
    } catch {
      document.getElementById('statusDot').className = 'status-dot offline';
      document.getElementById('statusText').textContent = 'Offline';
    }
  }
  checkHealth();
  setInterval(checkHealth, 30000);

  // ── Textarea auto-resize ──────────────────────────────────────────────────
  const textarea = document.getElementById('queryInput');
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 180) + 'px';
  });
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Suggestion chips ──────────────────────────────────────────────────────
  function useQuery(btn) {
    textarea.value = btn.textContent.trim();
    textarea.dispatchEvent(new Event('input'));
    textarea.focus();
  }

  // ── Markdown renderer (minimal, no deps) ─────────────────────────────────
  function renderMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      // Code blocks
      .replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => `<pre><code>${code.trim()}</code></pre>`)
      // Inline code
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // Bold
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // Italic
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // H1-H3
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      // Blockquote
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      // Horizontal rule
      .replace(/^---$/gm, '<hr style="border-color:var(--border);margin:12px 0">')
      // Unordered list (convert block)
      .replace(/(^[•\-\*] .+\n?)+/gm, match => {
        const items = match.trim().split('\n').map(l => `<li>${l.replace(/^[•\-\*] /, '')}</li>`).join('');
        return `<ul>${items}</ul>`;
      })
      // Ordered list
      .replace(/(^\d+\. .+\n?)+/gm, match => {
        const items = match.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
        return `<ol>${items}</ol>`;
      })
      // Links
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      // Paragraphs (double newline)
      .replace(/\n{2,}/g, '</p><p>')
      // Single newlines
      .replace(/\n/g, '<br>')
      .replace(/^(.+)$/, '<p>$1</p>');
  }

  // ── Add message to DOM ────────────────────────────────────────────────────
  function addMessage({ role, content, agentTag, time }) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = role === 'user' ? 'U' : '🧠';
    const name = role === 'user' ? 'You' : 'pmgPT';
    const tagHtml = agentTag ? `<span class="agent-tag">${agentTag}</span>` : '';
    const timeStr = time || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="name">${name}</span>
          ${tagHtml}
          <span class="time">${timeStr}</span>
        </div>
        <div class="msg-content">${role === 'bot' ? renderMarkdown(content) : escapeHtml(content)}</div>
      </div>`;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="msg-avatar">🧠</div>
      <div class="msg-body">
        <div class="msg-meta"><span class="name">pmgPT</span></div>
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function sendMessage() {
    if (isLoading) return;
    const query = textarea.value.trim();
    if (!query) return;

    const role = document.getElementById('roleSelect').value;
    const token = `${role}:secret`;

    textarea.value = '';
    textarea.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    isLoading = true;

    addMessage({ role: 'user', content: query });
    addTyping();

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
        body: JSON.stringify({ query }),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        addMessage({ role: 'bot', content: `**Error ${res.status}:** ${err.detail || 'Unknown error'}`, agentTag: 'error' });
      } else {
        const data = await res.json();
        addMessage({ role: 'bot', content: data.response, agentTag: data.agent });
      }
    } catch (err) {
      removeTyping();
      addMessage({ role: 'bot', content: `**Connection error:** ${err.message}\n\nMake sure the pmgPT server is running on port 8000.`, agentTag: 'error' });
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    textarea.focus();
  }
</script>
</body>
</html>
